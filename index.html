<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>DUAL — Echo Fragments</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<style>
:root{
  --c:#00e5ff;--earth:#c8872a;--smoke:#7a1fcc;--tech:#00bcd4;
  --wind:#6a8090;--speed:#ff6a00;--psychic:#8b1030;--metal:#5a6070;
  --lurnox:#00ffcc;--tronox:#cc1010;--cretox:#1040cc;
  --bg:#020508;--panel:rgba(2,5,12,.88);
  --ff1:'Cinzel Decorative',serif;--ff2:'Rajdhani',sans-serif;--ff3:'Share Tech Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:#dde8ee;font-family:var(--ff2);touch-action:manipulation;user-select:none}
#app{width:100vw;height:100vh;position:relative;overflow:hidden}

/* ── RAIN ── */
.rain{position:fixed;inset:-5%;pointer-events:none;z-index:1;
  background-image:linear-gradient(108deg,rgba(160,210,255,.15) 1px,transparent 1px);
  background-size:32px 50px;opacity:.18;animation:rainF .32s linear infinite}
@keyframes rainF{to{transform:translate(-32px,50px)}}
.vign{position:fixed;inset:0;box-shadow:inset 0 0 200px rgba(0,0,0,.9);pointer-events:none;z-index:2}
.lightning{position:fixed;inset:0;opacity:0;pointer-events:none;z-index:1;
  background:rgba(100,180,255,.05);animation:lx 7s ease-in-out infinite}
@keyframes lx{0%,88%,100%{opacity:0}89%{opacity:1}90%{opacity:0}91%{opacity:.4}92%{opacity:0}}

/* ── SCENE ── */
.scene{
  position:fixed;inset:0;z-index:10;
  display:none;flex-direction:column;
  background:var(--bg);
  transition:opacity .6s ease;
  opacity:0;
}
.scene.active{display:flex;opacity:1}
.scene.fade-in{animation:fadeIn .6s ease forwards}
.scene.shake{animation:shake .4s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes shake{0%,100%{transform:translate(0,0)}20%{transform:translate(12px,-8px)}40%{transform:translate(-10px,6px)}60%{transform:translate(8px,-4px)}80%{transform:translate(-5px,3px)}}

/* ── SCENE BG ── */
.sbg{position:absolute;inset:0;z-index:0}

/* ── HEADER BAR ── */
.hbar{
  position:relative;z-index:20;
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 12px;
  background:linear-gradient(to bottom,rgba(0,0,0,.92),rgba(0,0,0,.5));
  border-bottom:1px solid rgba(0,229,255,.12);
  flex-shrink:0;
}
.hbar-title{font-family:var(--ff1);font-size:clamp(.55rem,2.2vw,.8rem);color:var(--c);letter-spacing:.15em}
.hbar-sub{font-family:var(--ff3);font-size:.42rem;color:#2a4050;letter-spacing:.1em}
.hbar-stats{display:flex;gap:10px;align-items:center}
.stat{display:flex;flex-direction:column;align-items:flex-end;gap:2px}
.stat-label{font-family:var(--ff3);font-size:.38rem;color:#1a3040;letter-spacing:.1em}
.stat-bar{width:80px;height:6px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden;border:1px solid rgba(255,255,255,.06)}
.stat-bar i{display:block;height:100%;border-radius:4px;transition:width .5s ease}
.hp-fill{background:linear-gradient(90deg,#b02020,#e74c3c,#ff7777);box-shadow:0 0 5px rgba(231,76,60,.6)}
.eco-fill{background:linear-gradient(90deg,var(--c),#aaf4ff);box-shadow:0 0 5px rgba(0,229,255,.5)}

/* ── MAIN SCENE AREA ── */
.smain{flex:1;position:relative;display:flex;align-items:flex-end;overflow:hidden}

/* ── CHARACTER CSS ART ── */
.char-art{position:absolute;bottom:0;pointer-events:none}

/* LIN */
.lin-art{left:2%;width:28%;max-width:160px;height:75%;z-index:5}
.lin-body{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:100%;height:100%}
.lin-aura{position:absolute;inset:-10%;border-radius:50%;background:radial-gradient(circle,rgba(200,135,42,.15) 0%,transparent 65%);animation:auraB 2.5s ease-in-out infinite}
.lin-legs{position:absolute;bottom:0;left:20%;width:60%;height:30%;background:linear-gradient(#0a1218,#030405);border-radius:5px 5px 0 0}
.lin-torso{position:absolute;bottom:28%;left:12%;width:76%;height:38%;background:linear-gradient(175deg,#1c242c,#050607);border-radius:10px 10px 5px 5px}
.lin-torso::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(200,135,42,.5),transparent)}
.lin-head{position:absolute;bottom:65%;left:28%;width:44%;height:20%;background:#201410;border-radius:50%}
.lin-cap{position:absolute;bottom:83%;left:18%;width:64%;height:8%;background:#030405;border-radius:10px}
.lin-rock{position:absolute;background:linear-gradient(135deg,#c8872a,#8a4e18,#3d1600);clip-path:polygon(50% 0,100% 36%,80% 100%,20% 100%,0 36%);box-shadow:0 0 10px rgba(200,135,42,.8);animation:rockF ease-in-out infinite}
.lr1{width:16%;height:auto;aspect-ratio:1;left:2%;bottom:55%;animation-duration:2.2s}
.lr2{width:12%;aspect-ratio:1;right:5%;bottom:48%;animation-duration:2.8s;animation-delay:.5s}
.lr3{width:10%;aspect-ratio:1;left:8%;bottom:38%;animation-duration:3.2s;animation-delay:1s}
.lin-glow{position:absolute;bottom:0;left:10%;right:10%;height:4px;background:linear-gradient(90deg,transparent,rgba(200,135,42,.6),transparent);border-radius:2px;box-shadow:0 0 12px rgba(200,135,42,.5);animation:glowP 2s ease-in-out infinite}
@keyframes rockF{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-18px) rotate(10deg)}}
@keyframes glowP{50%{box-shadow:0 0 22px rgba(200,135,42,.8);opacity:.5}}
@keyframes auraB{0%,100%{transform:scale(1);opacity:.8}50%{transform:scale(1.12);opacity:1}}

/* TRINI */
.trini-art{left:22%;width:22%;max-width:130px;height:65%;z-index:4}
.trini-body{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:100%;height:100%}
.trini-aura{position:absolute;inset:-15%;border-radius:50%;background:radial-gradient(circle,rgba(122,31,204,.18) 0%,transparent 65%);animation:auraB 2s ease-in-out infinite .4s}
.trini-shadow{position:absolute;bottom:-2%;left:-20%;right:-20%;height:110%;
  background:radial-gradient(ellipse at 50% 100%,rgba(80,0,120,.6) 0%,transparent 70%);
  animation:shadowFlow 3s ease-in-out infinite;border-radius:50%}
@keyframes shadowFlow{0%,100%{transform:scaleX(1) scaleY(1)}50%{transform:scaleX(1.2) scaleY(.9)}}
.trini-legs{position:absolute;bottom:0;left:22%;width:56%;height:28%;background:linear-gradient(#0d0818,#030205);border-radius:5px 5px 0 0}
.trini-torso{position:absolute;bottom:26%;left:14%;width:72%;height:36%;background:linear-gradient(175deg,#140820,#040106);border-radius:10px 10px 5px 5px}
.trini-torso::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(122,31,204,.6),transparent)}
.trini-head{position:absolute;bottom:60%;left:28%;width:44%;height:20%;background:#180820;border-radius:50%}
.trini-hair{position:absolute;bottom:70%;left:20%;width:60%;height:18%;background:#0a0410;border-radius:50% 50% 0 0;filter:blur(.5px)}
.smoke-particle{position:absolute;border-radius:50%;background:rgba(122,31,204,.4);animation:smokeUp linear infinite;filter:blur(3px)}
.sp1{width:12px;height:12px;left:10%;bottom:20%;animation-duration:2s;animation-delay:0s}
.sp2{width:8px;height:8px;right:15%;bottom:30%;animation-duration:2.5s;animation-delay:.6s}
.sp3{width:10px;height:10px;left:5%;bottom:40%;animation-duration:3s;animation-delay:1.2s}
@keyframes smokeUp{0%{opacity:0;transform:translateY(0) scale(1)}30%{opacity:.8}100%{opacity:0;transform:translateY(-60px) scale(2)}}

/* ZAK */
.zak-art{left:38%;width:22%;max-width:130px;height:65%;z-index:4}
.zak-body{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:100%;height:100%}
.zak-aura{position:absolute;inset:-15%;border-radius:50%;background:radial-gradient(circle,rgba(0,188,212,.15) 0%,transparent 65%);animation:auraB 2.2s ease-in-out infinite .8s}
.zak-legs{position:absolute;bottom:0;left:22%;width:56%;height:28%;background:linear-gradient(#080d12,#030405);border-radius:5px 5px 0 0}
.zak-torso{position:absolute;bottom:26%;left:14%;width:72%;height:36%;background:linear-gradient(175deg,#0a1824,#030607);border-radius:10px 10px 5px 5px}
.zak-torso::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(0,188,212,.6),transparent)}
.zak-head{position:absolute;bottom:60%;left:28%;width:44%;height:20%;background:#101820;border-radius:50%}
.zak-phone{position:absolute;bottom:38%;right:5%;width:14%;height:18%;background:linear-gradient(#0a1824,#030607);border-radius:2px;border:1px solid rgba(0,188,212,.5);box-shadow:0 0 8px rgba(0,188,212,.4)}
.zak-phone::after{content:'';position:absolute;inset:2px;background:rgba(0,188,212,.15);animation:screenBlink 1.5s ease-in-out infinite}
@keyframes screenBlink{0%,100%{opacity:.3}50%{opacity:1}}
.tech-particle{position:absolute;width:3px;height:3px;background:var(--tech);border-radius:50%;box-shadow:0 0 5px var(--tech);animation:techFloat linear infinite}
.tp1{left:5%;bottom:40%;animation-duration:1.5s;animation-delay:0s}
.tp2{right:8%;bottom:50%;animation-duration:2s;animation-delay:.4s}
.tp3{left:15%;bottom:30%;animation-duration:1.8s;animation-delay:.8s}
.tp4{right:5%;bottom:35%;animation-duration:2.2s;animation-delay:1.2s}
@keyframes techFloat{0%{opacity:0;transform:translateY(0)}20%{opacity:1}80%{opacity:.5}100%{opacity:0;transform:translateY(-30px)}}

/* VILLAINS */
/* AERONYX */
.aeronyx-art{right:2%;width:35%;max-width:200px;height:85%;z-index:5}
.aero-body{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:100%;height:100%}
.aero-glow{position:absolute;inset:-20%;border-radius:50%;background:radial-gradient(circle,rgba(100,128,144,.15) 0%,transparent 60%);animation:auraB 2.8s ease-in-out infinite}
.wind-ring{position:absolute;left:50%;top:35%;transform:translate(-50%,-50%);border-radius:50%;border:solid rgba(100,128,144,.25);animation:windSp linear infinite}
.wr1{width:90%;padding-top:90%;border-width:6px;animation-duration:5s}
.wr2{width:65%;padding-top:65%;border-width:4px;animation-duration:3.5s;animation-direction:reverse;border-color:rgba(100,128,144,.15)}
.wr3{width:38%;padding-top:38%;border-width:3px;animation-duration:2.2s;border-color:rgba(100,128,144,.3)}
@keyframes windSp{to{transform:translate(-50%,-50%) rotate(360deg)}}
.aero-mass{position:absolute;left:20%;top:15%;width:60%;height:65%;
  background:linear-gradient(175deg,#0e1c28,#030810);
  clip-path:polygon(50% 0,88% 15%,80% 100%,20% 100%,12% 15%);
  box-shadow:0 0 25px rgba(100,128,144,.3)}
.aero-eye{position:absolute;top:42%;width:14%;height:7%;background:var(--wind);border-radius:50%;box-shadow:0 0 12px var(--wind),0 0 25px rgba(106,128,144,.5);animation:eyeGl 2s ease-in-out infinite}
.ae1{left:28%}.ae2{right:28%;animation-delay:.5s}
@keyframes eyeGl{50%{opacity:.15;box-shadow:0 0 4px var(--wind)}}
.aero-tendril{position:absolute;width:3px;border-radius:3px;background:linear-gradient(to bottom,rgba(100,128,144,.5),transparent);transform-origin:top;animation:tendrilW ease-in-out infinite}
.at1{height:20%;left:10%;top:55%;animation-duration:2.2s}
.at2{height:15%;right:12%;top:50%;animation-duration:2.8s;animation-delay:.5s}
.at3{height:18%;left:5%;top:68%;animation-duration:3s;animation-delay:1s}
@keyframes tendrilW{0%,100%{transform:rotate(-10deg)}50%{transform:rotate(10deg)}}
.aero-wind-particle{position:absolute;border-radius:50%;background:rgba(100,128,144,.5);box-shadow:0 0 4px var(--wind);animation:windP linear infinite}
.awp1{width:5px;height:5px;left:5%;top:30%;animation-duration:3s}
.awp2{width:3px;height:3px;right:8%;top:50%;animation-duration:4s;animation-delay:1s}
.awp3{width:4px;height:4px;left:15%;top:65%;animation-duration:3.5s;animation-delay:.5s}
@keyframes windP{0%{opacity:0;transform:translateY(0)}20%{opacity:1}100%{opacity:0;transform:translateY(-40px)}}

/* BORINEX */
.borinex-art{right:2%;width:32%;max-width:180px;height:80%;z-index:5}
.bori-body{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:100%;height:100%}
.bori-glow{position:absolute;inset:-15%;border-radius:50%;background:radial-gradient(circle,rgba(255,100,0,.2) 0%,transparent 60%);animation:auraB 1.8s ease-in-out infinite}
.bori-streak{position:absolute;height:3px;background:linear-gradient(90deg,transparent,rgba(255,106,0,.8),transparent);border-radius:2px;animation:streakMove linear infinite}
.bs1{width:60%;top:30%;left:-10%;animation-duration:.8s}
.bs2{width:40%;top:50%;left:-5%;animation-duration:.6s;animation-delay:.2s}
.bs3{width:50%;top:70%;left:-8%;animation-duration:.7s;animation-delay:.1s}
@keyframes streakMove{0%{transform:translateX(-100%);opacity:0}50%{opacity:1}100%{transform:translateX(200%);opacity:0}}
.bori-mass{position:absolute;left:15%;top:10%;width:70%;height:75%;
  background:linear-gradient(175deg,#1a0a02,#050202);
  clip-path:polygon(50% 0,90% 20%,85% 100%,15% 100%,10% 20%);
  box-shadow:0 0 30px rgba(255,106,0,.3)}
.bori-eye{position:absolute;top:38%;width:16%;height:8%;background:var(--speed);border-radius:50%;box-shadow:0 0 14px var(--speed),0 0 28px rgba(255,106,0,.5);animation:eyeGl 1.2s ease-in-out infinite}
.be1{left:26%}.be2{right:26%;animation-delay:.3s}
.bori-crack{position:absolute;bottom:5%;left:10%;right:10%;height:3px;background:linear-gradient(90deg,transparent,rgba(255,106,0,.6),transparent);animation:glowP 1s ease-in-out infinite}

/* MIREX */
.mirex-art{right:2%;width:32%;max-width:180px;height:80%;z-index:5}
.mirex-body{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:100%;height:100%}
.mirex-glow{position:absolute;inset:-18%;border-radius:50%;background:radial-gradient(circle,rgba(139,16,48,.22) 0%,transparent 60%);animation:auraB 3s ease-in-out infinite}
.psy-ring{position:absolute;left:50%;top:30%;transform:translate(-50%,-50%);border-radius:50%;border:2px solid rgba(139,16,48,.3);animation:psySp linear infinite}
.pr1{width:80%;padding-top:80%;animation-duration:4s}
.pr2{width:55%;padding-top:55%;animation-duration:3s;animation-direction:reverse}
@keyframes psySp{to{transform:translate(-50%,-50%) rotate(360deg)}}
.mirex-mass{position:absolute;left:18%;top:12%;width:64%;height:70%;
  background:linear-gradient(175deg,#180510,#040105);
  clip-path:polygon(50% 0,86% 18%,78% 100%,22% 100%,14% 18%);
  box-shadow:0 0 25px rgba(139,16,48,.35)}
.mirex-eye{position:absolute;top:40%;width:15%;height:7%;background:#cc2050;border-radius:50%;box-shadow:0 0 12px #cc2050,0 0 25px rgba(139,16,48,.6);animation:eyeGl 2.5s ease-in-out infinite}
.me1{left:27%}.me2{right:27%;animation-delay:.6s}
.psy-particle{position:absolute;border-radius:50%;background:rgba(139,16,48,.6);animation:psyFloat ease-in-out infinite}
.pp1{width:6px;height:6px;left:8%;top:25%;animation-duration:3s}
.pp2{width:4px;height:4px;right:10%;top:40%;animation-duration:4s;animation-delay:.8s}
.pp3{width:5px;height:5px;left:5%;top:55%;animation-duration:3.5s;animation-delay:1.5s}
@keyframes psyFloat{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-20px) scale(1.5);opacity:.3}}

/* FERRONIX */
.ferronix-art{right:2%;width:32%;max-width:180px;height:82%;z-index:5}
.ferr-body{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:100%;height:100%}
.ferr-glow{position:absolute;inset:-15%;border-radius:50%;background:radial-gradient(circle,rgba(80,90,100,.18) 0%,transparent 60%);animation:auraB 3.5s ease-in-out infinite}
.metal-shard{position:absolute;background:linear-gradient(135deg,#8090a0,#404850);animation:shardFloat ease-in-out infinite}
.ms1{width:8%;height:16%;left:5%;top:20%;clip-path:polygon(50% 0,100% 50%,50% 100%,0 50%);animation-duration:2.5s;box-shadow:0 0 5px rgba(128,144,160,.5)}
.ms2{width:6%;height:12%;right:8%;top:35%;clip-path:polygon(50% 0,100% 50%,50% 100%,0 50%);animation-duration:3s;animation-delay:.6s;box-shadow:0 0 4px rgba(128,144,160,.4)}
.ms3{width:5%;height:10%;left:10%;top:50%;clip-path:polygon(50% 0,100% 50%,50% 100%,0 50%);animation-duration:3.5s;animation-delay:1.2s;box-shadow:0 0 3px rgba(128,144,160,.3)}
@keyframes shardFloat{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-15px) rotate(20deg)}}
.ferr-mass{position:absolute;left:16%;top:10%;width:68%;height:72%;
  background:linear-gradient(175deg,#101418,#030405);
  clip-path:polygon(50% 0,88% 16%,82% 100%,18% 100%,12% 16%);
  box-shadow:0 0 20px rgba(80,90,100,.3)}
.ferr-eye{position:absolute;top:40%;width:15%;height:7%;background:#8090a0;border-radius:50%;box-shadow:0 0 10px #8090a0,0 0 22px rgba(80,90,100,.5);animation:eyeGl 3s ease-in-out infinite}
.fe1{left:27%}.fe2{right:27%;animation-delay:.7s}

/* LURNOX */
.lurnox-art{right:0;width:55%;max-width:300px;height:95%;z-index:5}
.lurnox-body{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:100%;height:100%}
.lurnox-glow{position:absolute;inset:-20%;border-radius:50%;background:radial-gradient(circle,rgba(0,255,180,.15) 0%,transparent 55%);animation:auraB 2s ease-in-out infinite}
.lurnox-ring{position:absolute;left:50%;top:30%;transform:translate(-50%,-50%);border-radius:50%;border:solid rgba(0,255,180,.2);animation:windSp linear infinite}
.lur-r1{width:95%;padding-top:95%;border-width:8px;animation-duration:6s}
.lur-r2{width:70%;padding-top:70%;border-width:5px;animation-duration:4s;animation-direction:reverse;border-color:rgba(0,255,180,.15)}
.lur-r3{width:45%;padding-top:45%;border-width:4px;animation-duration:2.5s;border-color:rgba(0,255,180,.25)}
.lurnox-mass{position:absolute;left:15%;top:8%;width:70%;height:70%;
  background:linear-gradient(175deg,#051a14,#020508);
  clip-path:polygon(50% 0,85% 12%,88% 45%,70% 100%,30% 100%,12% 45%,15% 12%);
  box-shadow:0 0 40px rgba(0,255,180,.25)}
.lurnox-eye{position:absolute;top:38%;width:18%;height:9%;background:var(--lurnox);border-radius:50%;box-shadow:0 0 20px var(--lurnox),0 0 40px rgba(0,255,180,.6);animation:eyeGl 1.5s ease-in-out infinite}
.le1{left:24%}.le2{right:24%;animation-delay:.4s}
.lurnox-horn{position:absolute;top:0;width:25%;background:linear-gradient(to top,#051a14,rgba(0,255,180,.4));clip-path:polygon(30% 100%,70% 100%,50% 0)}
.lh1{left:12%;transform:rotate(-15deg)}.lh2{right:12%;transform:rotate(15deg)}
.lurnox-tendril{position:absolute;width:4px;border-radius:3px;background:linear-gradient(to bottom,rgba(0,255,180,.5),transparent);transform-origin:top;animation:tendrilW ease-in-out infinite}
.lt1{height:22%;left:5%;top:55%;animation-duration:2s}
.lt2{height:18%;right:8%;top:48%;animation-duration:2.6s;animation-delay:.4s}
.lt3{height:25%;left:2%;top:68%;animation-duration:3s;animation-delay:.8s}
.lt4{height:15%;right:3%;top:65%;animation-duration:2.2s;animation-delay:1.2s}
.lurnox-particle{position:absolute;border-radius:50%;background:rgba(0,255,180,.5);box-shadow:0 0 6px var(--lurnox);animation:windP linear infinite}
.lp1{width:6px;height:6px;left:3%;top:25%;animation-duration:3s}
.lp2{width:4px;height:4px;right:5%;top:45%;animation-duration:4s;animation-delay:1s}
.lp3{width:5px;height:5px;left:8%;top:60%;animation-duration:3.5s;animation-delay:.5s}
.lp4{width:3px;height:3px;right:2%;top:30%;animation-duration:2.5s;animation-delay:1.5s}

/* CITY BG */
.city-bg{
  position:absolute;inset:0;
  background:
    linear-gradient(to top,rgba(0,0,0,.9) 0%,transparent 50%),
    repeating-linear-gradient(90deg,
      #040810 0px,#040810 20px,#060c18 20px,#060c18 38px,
      #030710 38px,#030710 60px,#050b15 60px,#050b15 78px,
      #040912 78px,#040912 105px
    );
  opacity:.8;
  -webkit-mask-image:linear-gradient(to top,black 35%,transparent 100%);
  mask-image:linear-gradient(to top,black 35%,transparent 100%);
}
.city-fire{position:absolute;bottom:15%;left:0;right:0;height:8%;
  background:linear-gradient(to top,rgba(255,80,0,.15),transparent);
  animation:fireFlick 1.5s ease-in-out infinite}
@keyframes fireFlick{0%,100%{opacity:.6;transform:scaleY(1)}50%{opacity:1;transform:scaleY(1.3)}}

/* ECO color overlays */
.eco-earth{background:radial-gradient(ellipse at 20% 80%,rgba(200,135,42,.12) 0%,transparent 45%),radial-gradient(ellipse at 80% 20%,rgba(0,229,255,.06) 0%,transparent 40%),linear-gradient(180deg,#04080e 0%,#0a1205 100%)}
.eco-smoke{background:radial-gradient(ellipse at 25% 75%,rgba(122,31,204,.18) 0%,transparent 45%),linear-gradient(180deg,#04020e 0%,#080510 100%)}
.eco-tech{background:radial-gradient(ellipse at 75% 25%,rgba(0,188,212,.14) 0%,transparent 45%),linear-gradient(180deg,#020810 0%,#041018 100%)}
.eco-wind{background:radial-gradient(ellipse at 80% 60%,rgba(100,128,144,.18) 0%,transparent 45%),linear-gradient(180deg,#040810 0%,#08101a 100%)}
.eco-speed{background:radial-gradient(ellipse at 80% 60%,rgba(255,106,0,.2) 0%,transparent 45%),linear-gradient(180deg,#080402 0%,#100802 100%)}
.eco-psychic{background:radial-gradient(ellipse at 80% 60%,rgba(139,16,48,.22) 0%,transparent 45%),linear-gradient(180deg,#060202 0%,#100508 100%)}
.eco-metal{background:radial-gradient(ellipse at 80% 60%,rgba(80,90,100,.18) 0%,transparent 45%),linear-gradient(180deg,#040608 0%,#080c10 100%)}
.eco-lurnox{background:radial-gradient(ellipse at 80% 40%,rgba(0,255,180,.18) 0%,transparent 45%),linear-gradient(180deg,#020810 0%,#041510 100%)}

/* ── TEXT BOX ── */
.textbox{
  position:relative;z-index:20;
  margin:0 10px 8px;
  padding:14px 16px;
  background:linear-gradient(135deg,rgba(0,0,0,.88),rgba(0,5,12,.92));
  border:1px solid rgba(0,229,255,.15);
  border-radius:10px;
  box-shadow:0 0 30px rgba(0,229,255,.07),inset 0 1px 0 rgba(0,229,255,.1);
  backdrop-filter:blur(8px);
  flex-shrink:0;
}
.tb-speaker{font-family:var(--ff1);font-size:clamp(.5rem,2vw,.72rem);color:var(--c);letter-spacing:.12em;margin-bottom:5px}
.tb-text{font-size:clamp(.7rem,2.5vw,.9rem);line-height:1.6;color:#c8d8e0;min-height:3.5em;font-weight:600}
.cursor{display:inline-block;width:2px;height:1em;background:var(--c);margin-left:2px;animation:blink .8s step-end infinite;vertical-align:middle}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* ── CHOICES ── */
.choices{
  position:relative;z-index:20;
  display:flex;flex-direction:column;
  gap:6px;margin:0 10px 10px;
}
.choice{
  padding:10px 14px;
  background:linear-gradient(135deg,rgba(0,0,0,.75),rgba(0,5,12,.85));
  border:1px solid rgba(0,229,255,.18);
  border-radius:8px;color:#dde8ee;
  font-family:var(--ff2);font-size:clamp(.65rem,2.5vw,.85rem);
  font-weight:600;cursor:pointer;
  transition:all .2s;letter-spacing:.04em;
  text-align:left;
  backdrop-filter:blur(6px);
}
.choice:hover,.choice:active{
  background:linear-gradient(135deg,rgba(0,229,255,.12),rgba(0,100,130,.1));
  border-color:var(--c);
  box-shadow:0 0 15px rgba(0,229,255,.2);
  transform:translateX(4px);
}
.choice-prefix{color:var(--c);margin-right:6px;font-family:var(--ff3)}

/* ── CONTINUE BUTTON ── */
.btn-continue{
  position:relative;z-index:20;
  margin:0 10px 10px;
  padding:10px;
  border:1px solid rgba(0,229,255,.2);
  border-radius:8px;
  background:transparent;color:rgba(0,229,255,.5);
  font-family:var(--ff3);font-size:.55rem;
  letter-spacing:.2em;cursor:pointer;
  text-align:center;transition:all .2s;
}
.btn-continue:hover{color:var(--c);border-color:var(--c)}

/* ── MENU SCREEN ── */
#scMenu{
  background:radial-gradient(ellipse at 50% 20%,rgba(0,229,255,.1) 0%,transparent 50%),
    linear-gradient(180deg,#020508 0%,#040c18 100%);
  align-items:center;justify-content:center;
}
.menu-wrap{
  width:min(480px,92vw);display:flex;flex-direction:column;
  align-items:center;gap:1.4rem;
  padding:2rem 1.8rem;
  background:linear-gradient(160deg,rgba(0,15,28,.82),rgba(0,4,10,.92));
  border:1px solid rgba(0,229,255,.15);border-radius:14px;
  box-shadow:0 0 60px rgba(0,229,255,.09);backdrop-filter:blur(14px);
}
.menu-rule{width:100%;height:1px}
.menu-rule.top{background:linear-gradient(90deg,transparent,rgba(0,229,255,.5),transparent)}
.menu-rule.bot{background:linear-gradient(90deg,transparent,rgba(200,135,42,.4),transparent)}
.logo-big{font-family:var(--ff1);font-size:clamp(3.5rem,16vw,6rem);font-weight:900;color:#fff;letter-spacing:.12em;line-height:1;text-shadow:0 0 22px var(--c),0 0 55px rgba(0,229,255,.3),0 3px 0 rgba(0,0,0,.9);text-align:center}
.logo-city{font-family:var(--ff3);font-size:clamp(.52rem,2vw,.75rem);color:var(--earth);letter-spacing:.25em;text-align:center;margin-top:.3rem}
.logo-tag{font-size:.58rem;color:#1e2e38;letter-spacing:.1em;text-align:center}
.menu-lore{font-size:clamp(.68rem,2.5vw,.85rem);color:#5a7a8a;line-height:1.6;text-align:center;max-width:360px}
.menu-lore em{color:var(--c);font-style:normal}
.btn-play{
  position:relative;width:100%;max-width:280px;padding:.9rem;
  border:1px solid var(--c);border-radius:6px;
  background:linear-gradient(135deg,rgba(0,229,255,.1),rgba(0,140,170,.06));
  color:var(--c);font-family:var(--ff1);font-size:clamp(.78rem,3vw,.95rem);
  letter-spacing:.2em;cursor:pointer;overflow:hidden;
  box-shadow:0 0 20px rgba(0,229,255,.15);transition:all .2s;
}
.btn-play:hover{background:linear-gradient(135deg,rgba(0,229,255,.2),rgba(0,160,200,.12));box-shadow:0 0 35px rgba(0,229,255,.28)}
.bsh{position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(0,229,255,.18),transparent);animation:shim 2.5s linear infinite}
@keyframes shim{from{transform:translateX(-100%)}to{transform:translateX(100%)}}
.btxt{position:relative;z-index:1}
.menu-chars{display:flex;gap:1.2rem;justify-content:center}
.mc-char{display:flex;flex-direction:column;align-items:center;gap:.3rem}
.mc-orb{width:48px;height:48px;border-radius:50%;border:2px solid;animation:orbP 2.8s ease-in-out infinite}
@keyframes orbP{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.mc-orb.e{border-color:var(--earth);background:radial-gradient(circle at 35%,rgba(200,135,42,.6),rgba(60,25,5,.4));box-shadow:0 0 18px rgba(200,135,42,.55)}
.mc-orb.s{border-color:var(--smoke);background:radial-gradient(circle at 35%,rgba(122,31,204,.6),rgba(30,5,50,.4));box-shadow:0 0 18px rgba(122,31,204,.5);animation-delay:.5s}
.mc-orb.t{border-color:var(--tech);background:radial-gradient(circle at 35%,rgba(0,188,212,.6),rgba(0,30,40,.4));box-shadow:0 0 18px rgba(0,188,212,.5);animation-delay:1s}
.mc-name{font-family:var(--ff1);font-size:.6rem;letter-spacing:.08em}
.mc-power{font-size:.45rem;color:#1e2e38;letter-spacing:.12em}

/* ── END SCREEN ── */
#scEnd{align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 30%,rgba(0,229,255,.08) 0%,transparent 50%),linear-gradient(180deg,#020508 0%,#040c18 100%)}
.end-card{width:min(460px,88vw);padding:2rem 1.8rem;border-radius:12px;background:rgba(0,5,12,.9);border:1px solid rgba(0,229,255,.15);box-shadow:0 0 50px rgba(0,229,255,.08);backdrop-filter:blur(14px);display:flex;flex-direction:column;align-items:center;gap:1.1rem;text-align:center}
.end-rule{width:100%;height:1px;background:linear-gradient(90deg,transparent,rgba(0,229,255,.42),transparent)}
.end-title{font-family:var(--ff1);font-size:clamp(1.8rem,7vw,2.8rem)}
.end-text{font-size:.85rem;color:#4a6a7a;line-height:1.6;max-width:320px}
</style>
</head>
<body>
<div class="rain"></div>
<div class="vign"></div>
<div class="lightning"></div>
<div id="app">

<!-- MENU -->
<div id="scMenu" class="scene active">
  <div class="menu-wrap">
    <div class="menu-rule top"></div>
    <div>
      <div class="logo-big">DUAL</div>
      <div class="logo-city">— ECHO FRAGMENTS —</div>
      <div class="logo-tag">UN MUNDO QUE SE HUNDE · UN ECO QUE DESPIERTA</div>
    </div>
    <div class="menu-chars">
      <div class="mc-char"><div class="mc-orb e"></div><div class="mc-name">LIN</div><div class="mc-power">TIERRA</div></div>
      <div class="mc-char"><div class="mc-orb s"></div><div class="mc-name">TRINI</div><div class="mc-power">SOMBRAS</div></div>
      <div class="mc-char"><div class="mc-orb t"></div><div class="mc-name">ZAK</div><div class="mc-power">TECNOLOGÍA</div></div>
    </div>
    <p class="menu-lore">La señal de <em>Trónox</em> fue enviada. Meteoritos caen sobre la ciudad.<br>Lurnox y sus criaturas han llegado. <em>Tú eliges hasta dónde llegar.</em></p>
    <button class="btn-play" id="btnPlay"><span class="bsh"></span><span class="btxt">▶ &nbsp;COMENZAR</span></button>
    <div class="menu-rule bot"></div>
  </div>
</div>

<!-- GAME SCENE -->
<div id="scGame" class="scene">
  <div class="sbg" id="sceneBg"></div>
  <div class="city-bg"></div>
  <div class="city-fire"></div>

  <!-- Characters (shown/hidden per scene) -->
  <div class="smain">
    <!-- LIN always left -->
    <div id="charLin" class="char-art lin-art" style="display:none">
      <div class="lin-body">
        <div class="lin-aura"></div>
        <div class="lin-legs"></div>
        <div class="lin-torso"></div>

    <!-- ZAK -->

    <!-- AERONYX -->
    <div id="charAeronyx" class="char-art aeronyx-art" style="display:none">
      <div class="aero-body">
        <div class="aero-glow"></div>
        <div class="wind-ring wr1"></div>
        <div class="wind-ring wr2"></div>

        <div class="aero-tendril at2"></div>
        <div class="aero-tendril at3"></div>
        <div class="aero-wind-particle awp1"></div>
        <div class="aero-wind-particle awp2"></div>
        <div class="aero-wind-particle awp3"></div>
      </div>
    </div>
    <!-- BORINEX -->
    <div id="charBorinex" class="char-art borinex-art" style="display:none">

        <div class="bori-streak bs2"></div>
        <div class="bori-streak bs3"></div>

    <!-- MIREX -->
    <div id="charMirex" class="char-art mirex-art" style="display:none">

  <!-- HUD -->
  <div class="hbar">

      <div class="stat">
        <div class="stat-label">VIDA</div>
        <div class="stat-bar"><i class="hp-fill" id="hpBar" style="width:100%"></i></div>
      </div>
      <div class="stat">
        <div class="stat-label">ECO</div>
        <div class="stat-bar"><i class="eco-fill" id="ecoBar" style="width:0%"></i></div>
      </div>

  <div class="textbox">
    <div class="tb-speaker" id="speaker">LIN</div>
    <div class="tb-text" id="tbText"><span class="cursor"></span></div>
  </div>

<!-- END -->

<script>
/* ═══════════════════════════
   DUAL: Echo Fragments
   Narrative Decision Game
═══════════════════════════ */

let hp=100, eco=0;
let currentNode='';
let typing=false;

// ── STORY DATA ──
const story = {

// ═══ ACTO 1: EL DESPERTAR ═══
's_intro':{
  bg:'eco-earth', speaker:'NARRADOR',
  chars:['lin'],
  title:'DUAL', sub:'ECHO FRAGMENTS · CAPÍTULO 1',
  text:'La ciudad de Vertex. Madrugada.\nLin se despierta de golpe. El piso tiembla. Afuera, el cielo está roto.',
  next:'s_lin_desperta'
},
's_lin_desperta':{
  bg:'eco-earth', speaker:'LIN',
  chars:['lin'],
  title:'EL DESPERTAR', sub:'',
  text:'¿Qué fue eso...? El piso vibró. Las paredes... siento algo raro. Mis manos.',
  next:'s_lin_manos'
},
's_lin_manos':{
  bg:'eco-earth', speaker:'LIN',
  chars:['lin'],
  text:'Las piedras del piso... se están moviendo. Sin tocarlas. Yo... las estoy moviendo.',
  choices:[
    {text:'Salir a ver qué pasa afuera', next:'s_salir', ecoChange:5, hpChange:0},
    {text:'Quedarte adentro y entender el poder primero', next:'s_quedar', ecoChange:10, hpChange:0},
  ]
},
's_quedar':{
  bg:'eco-earth', speaker:'LIN',
  chars:['lin'],
  text:'Levantás una roca del piso. Flota. La dirigís hacia la pared y la detenés a centímetros. Sos vos. Es tuyo.',
  next:'s_explosion_afuera'
},
's_salir':{
  bg:'eco-earth', speaker:'NARRADOR',
  chars:['lin'],
  text:'Abrís la puerta. El calor te golpea la cara. Tres edificios en llamas. Un rayo turquesa corta el cielo desde el horizonte.',
  next:'s_explosion_afuera'
},
's_explosion_afuera':{
  bg:'eco-earth', speaker:'NARRADOR',
  chars:['lin'],
  text:'Una explosión enorme sacude la ciudad. A lo lejos, soldados corren hacia algo. Algo que se mueve diferente. Algo que no es humano.',
  next:'s_decision_ir'
},
's_decision_ir':{
  bg:'eco-earth', speaker:'LIN',
  chars:['lin'],
  text:'Ese rayo. Viene de algún lugar. Si hay algo ahí... alguien tiene que ir.',
  choices:[
    {text:'Ir hacia el rayo. Es tu problema ahora.', next:'s_camino_rayo', ecoChange:8, hpChange:0},
    {text:'Buscar sobrevivientes primero.', next:'s_buscar_sobrevivientes', ecoChange:5, hpChange:5},
  ]
},

// ═══ ACTO 2: LAS CALLES ═══
's_camino_rayo':{
  bg:'eco-earth', speaker:'NARRADOR',
  chars:['lin'],
  title:'ACTO 2', sub:'LAS CALLES DE VERTEX',
  text:'Corrés por la ciudad destruida. Autos volcados. El asfalto partido. Una columna de piedra explota frente a vos — la detuviste sin pensar.',
  next:'s_militares'
},
's_buscar_sobrevivientes':{
  bg:'eco-earth', speaker:'NARRADOR',
  chars:['lin'],
  title:'ACTO 2', sub:'LAS CALLES DE VERTEX',
  text:'Sacás a tres personas de los escombros. Tus manos gimen por el esfuerzo. Algo en vos se despierta más. El Eco crece.',
  ecoChange:10, next:'s_militares'
},
's_militares':{
  bg:'eco-wind', speaker:'NARRADOR',
  chars:['lin'],
  text:'Un pelotón de soldados te rodea. Sus ojos... no están bien. Están nublados. Corruptos. Detrás de ellos, algo se mueve en el viento.',
  next:'s_aeronyx_aparece'
},
's_aeronyx_aparece':{
  bg:'eco-wind', speaker:'AERONYX',
  chars:['lin','aeronyx'],
  text:'Una figura emerge del aire. Su voz suena como una tormenta.\n"Custodio. Llegaste tarde. Esta ciudad ya es nuestra."',
  next:'s_aeronyx_decision'
},
's_aeronyx_decision':{
  bg:'eco-wind', speaker:'LIN',
  chars:['lin','aeronyx'],
  text:'Aeronyx. Control del viento. Un Trónox menor pero letal. Podés sentir su Eco marrón chocando contra el tuyo.',
  choices:[
    {text:'Pelear. Lanzar rocas contra Aeronyx.', next:'s_pelea_aeronyx', ecoChange:10, hpChange:-15},
    {text:'Esquivar y buscar cobertura.', next:'s_esquivar_aeronyx', ecoChange:5, hpChange:-5},
  ]
},
's_pelea_aeronyx':{
  bg:'eco-wind', speaker:'NARRADOR',
  chars:['lin','aeronyx'],
  shake:true,
  text:'Las rocas vuelan. Aeronyx las desvía con ráfagas de viento. Te golpea y salís volando. Te levantás. No terminó.',
  next:'s_trini_aparece'
},
's_esquivar_aeronyx':{
  bg:'eco-wind', speaker:'NARRADOR',
  chars:['lin'],
  text:'Rodás detrás de un auto volcado. El viento arrasa todo a tu alrededor. Aeronyx ríe. "¿Eso es todo, custodio?"',
  next:'s_trini_aparece'
},

// ═══ ACTO 3: TRINI ═══
's_trini_aparece':{
  bg:'eco-smoke', speaker:'NARRADOR',
  chars:['lin','trini'],
  title:'ACTO 3', sub:'LA ALIADA DE LAS SOMBRAS',
  text:'Algo oscuro se mueve a tu lado. Una chica. Apareció de la nada, como si hubiera cruzado a través de tu propia sombra.',
  next:'s_trini_habla'
},
's_trini_habla':{
  bg:'eco-smoke', speaker:'TRINI',
  chars:['lin','trini'],
  text:'"Me llamo Trini. También tengo uno adentro. Podemos hablar después — ahora hay que moverse."',
  next:'s_decision_trini'
},
's_decision_trini':{
  bg:'eco-smoke', speaker:'LIN',
  chars:['lin','trini'],
  text:'No la conocés. Apareció de la nada. Pero su Eco se siente real. Diferente al tuyo, pero limpio.',
  choices:[
    {text:'Confiar en Trini. Escapar juntos.', next:'s_escapan_juntos', ecoChange:8, hpChange:0},
    {text:'Desconfiar. Ir solo por ahora.', next:'s_ir_solo', ecoChange:0, hpChange:0},
  ]

// ── ENGINE ──
function showScene(id){
  const data=story[id];
  if(!data)return;
  currentNode=id;

  // BG
  const bg=document.getElementById('sceneBg');
  bg.className='sbg '+(data.bg||'eco-earth');

  // Title
  if(data.title){
    document.getElementById('hudTitle').textContent=data.title;
    document.getElementById('hudSub').textContent=data.sub||'';
  }

  // Characters
  const allChars=['lin','trini','zak','aeronyx','borinex','mirex','ferronix','lurnox'];
  allChars.forEach(c=>{
    const el=document.getElementById('char'+c.charAt(0).toUpperCase()+c.slice(1));
    if(el)el.style.display=(data.chars&&data.chars.includes(c))?'block':'none';
  });

  // Shake
  if(data.shake){
    document.getElementById('scGame').classList.add('shake');
    setTimeout(()=>document.getElementById('scGame').classList.remove('shake'),500);
  }

  // Speaker
  const speakerEl=document.getElementById('speaker');
  speakerEl.textContent=data.speaker||'';
  const speakerColors={LIN:'#c8872a',TRINI:'#9b59b6',ZAK:'#00bcd4',AERONYX:'#7aabb8',BORINEX:'#ff6a00',MIREX:'#cc2050',FERRONIX:'#8090a0',LURNOX:'#00ffcc',NARRADOR:'#00e5ff'};
  speakerEl.style.color=speakerColors[data.speaker]||'var(--c)';

  // Stat changes
  if(data.ecoChange){eco=Math.min(100,Math.max(0,eco+(data.ecoChange||0)));document.getElementById('ecoBar').style.width=eco+'%'}
  if(data.hpChange){hp=Math.min(100,Math.max(0,hp+(data.hpChange||0)));document.getElementById('hpBar').style.width=hp+'%'}

  // Choices & continue
  document.getElementById('choices').innerHTML='';
  document.getElementById('btnContinue').classList.add('hidden');

  // Type text
  typeText(data.text,()=>{
    if(data.end){showEnd(data.endType);return}
    if(data.choices&&data.choices.length){
      showChoices(data.choices);
    } else if(data.next){
      document.getElementById('btnContinue').classList.remove('hidden');
    }
  });
}

function typeText(text,cb){
  const el=document.getElementById('tbText');
  el.innerHTML='<span class="cursor"></span>';
  const chars=text.split('');
  let i=0;typing=true;
  // Skip on tap
  el.onclick=()=>{
    if(typing){
      el.textContent=text;
      el.innerHTML=text.replace(/\n/g,'<br>');
      typing=false;el.onclick=null;if(cb)cb();return;
    }
  };
  function next(){
    if(i>=chars.length){
      typing=false;el.onclick=null;
      if(cb)cb();return;
    }
    const ch=chars[i++];
    if(i===1)el.innerHTML='';
    if(ch==='\n')el.innerHTML+='<br>';
    else el.innerHTML+=ch;
    setTimeout(next,ch==='.'||ch==='!'||ch==='?'?55:22);
  }
  next();
}

function showChoices(choices){
  const wrap=document.getElementById('choices');
  wrap.innerHTML='';
  choices.forEach((ch,idx)=>{
    const btn=document.createElement('button');
    btn.className='choice';
    btn.innerHTML=`<span class="choice-prefix">${idx===0?'▶':'◆'}</span>${ch.text}`;
    btn.addEventListener('click',()=>{
      if(ch.ecoChange){eco=Math.min(100,Math.max(0,eco+ch.ecoChange));document.getElementById('ecoBar').style.width=eco+'%'}
      if(ch.hpChange){hp=Math.min(100,Math.max(0,hp+ch.hpChange));document.getElementById('hpBar').style.width=hp+'%'}
      wrap.innerHTML='';
      showScene(ch.next);
    });
    wrap.appendChild(btn);
  });
}

function showEnd(type){
  const titles={good:'¡EL ECO RESISTE!',alt:'LA GRIETA'};
  const texts={
    good:'Lin, Trini y Zak salvaron Vertex. En algún lugar, Theo y sus amigos siguen la batalla. El universo DUAL continúa.\n\n"El Eco nunca se fue."',
    alt:'Lurnox se fue... por ahora. La grieta que dejó es pequeña. Pero Lin la siente. Y algo del otro lado también la siente a ella.'
  };
  document.getElementById('endTitle').textContent=titles[type]||'FIN';
  document.getElementById('endTitle').style.color=type==='good'?'var(--c)':'var(--lurnox)';
  document.getElementById('endText').textContent=texts[type]||'';
  showSceneEl('scEnd');
}

function showSceneEl(id){
  document.querySelectorAll('.scene').forEach(s=>{s.classList.remove('active');s.style.display='none'});
  const el=document.getElementById(id);
  el.style.display='flex';
  setTimeout(()=>el.classList.add('active'),10);
}

// ── INIT ──
document.getElementById('btnPlay').addEventListener('click',()=>{
  hp=100;eco=0;
  document.getElementById('hpBar').style.width='100%';
  document.getElementById('ecoBar').style.width='0%';
  showSceneEl('scGame');
  setTimeout(()=>showScene('s_intro'),300);
});

document.getElementById('btnContinue').addEventListener('click',()=>{
  const data=story[currentNode];
  if(data&&data.next){
    document.getElementById('btnContinue').classList.add('hidden');
    showScene(data.next);
  }
});

document.getElementById('btnRestart').addEventListener('click',()=>{
  hp=100;eco=0;
  showSceneEl('scMenu');
});
</script>
